<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: 600 18px 'Segoe UI', sans-serif; fill: #e4e2e2; }
    .label { font: 400 13px 'Segoe UI', sans-serif; fill: #9f9f9f; }
    .value { font: 700 13px 'Segoe UI', sans-serif; fill: #e4e2e2; }
    .rank-text { font: 800 24px 'Segoe UI', sans-serif; fill: #e4e2e2; }
    .rank-sub { font: 400 10px 'Segoe UI', sans-serif; fill: #9f9f9f; }
    .icon { fill: #79c0ff; }
  </style>

  <!-- BACKGROUND — change fill to change card bg color -->
  <rect width="495" height="195" rx="4.5" fill="#161b22" stroke="#30363d" stroke-width="1"/>

  <!-- TITLE — change text here to update card title -->
  <text x="25" y="35" class="title">Deep Sarkar's GitHub Stats</text>

  <!-- =====================================================
       STAT ROWS — Edit the value in each <text class="value">
       to update a stat. Labels are in <text class="label">.
       ===================================================== -->

  <!-- ROW 1: Total Stars -->
  <!-- ICON: star -->
  <svg x="25" y="55" width="14" height="14" viewBox="0 0 16 16" class="icon">
    <path d="M8 .25a.75.75 0 0 1 .673.418l1.882 3.815 4.21.612a.75.75 0 0 1 .416 1.279l-3.046 2.97.719 4.192a.75.75 0 0 1-1.088.791L8 12.347l-3.766 1.98a.75.75 0 0 1-1.088-.79l.72-4.194L.818 6.374a.75.75 0 0 1 .416-1.28l4.21-.611L7.327.668A.75.75 0 0 1 8 .25Z"/>
  </svg>
  <text x="48" y="66" class="label">Total Stars Earned:</text>
  <!-- ★ UPDATE THIS: change "0" to your actual total stars count -->
  <text x="230" y="66" class="value">0</text>

  <!-- ROW 2: Total Commits -->
  <!-- ICON: git-commit -->
  <svg x="25" y="78" width="14" height="14" viewBox="0 0 16 16" class="icon">
    <path d="M11.93 8.5a4.002 4.002 0 0 1-7.86 0H.75a.75.75 0 0 1 0-1.5h3.32a4.002 4.002 0 0 1 7.86 0h3.32a.75.75 0 0 1 0 1.5Zm-1.43-.75a2.5 2.5 0 1 0-5 0 2.5 2.5 0 0 0 5 0Z"/>
  </svg>
  <text x="48" y="89" class="label">Total Commits (2026):</text>
  <!-- ★ UPDATE THIS: change "47" to your actual commit count for the year -->
  <text x="230" y="89" class="value">47</text>

  <!-- ROW 3: Total PRs -->
  <svg x="25" y="101" width="14" height="14" viewBox="0 0 16 16" class="icon">
    <path d="M1.5 3.25a2.25 2.25 0 1 1 3 2.122v5.256a2.251 2.251 0 1 1-1.5 0V5.372A2.25 2.25 0 0 1 1.5 3.25Zm5.677-.177L9.573.677A.25.25 0 0 1 10 .854V2.5h1A2.5 2.5 0 0 1 13.5 5v5.628a2.251 2.251 0 1 1-1.5 0V5a1 1 0 0 0-1-1h-1v1.646a.25.25 0 0 1-.427.177L7.177 3.427a.25.25 0 0 1 0-.354Z"/>
  </svg>
  <text x="48" y="112" class="label">Total PRs:</text>
  <!-- ★ UPDATE THIS: change "3" to your actual PR count -->
  <text x="230" y="112" class="value">3</text>

  <!-- ROW 4: Total Issues -->
  <svg x="25" y="124" width="14" height="14" viewBox="0 0 16 16" class="icon">
    <path d="M8 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z"/>
    <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0 13 0Z"/>
  </svg>
  <text x="48" y="135" class="label">Total Issues:</text>
  <!-- ★ UPDATE THIS: change "0" to your actual issues count -->
  <text x="230" y="135" class="value">0</text>

  <!-- ROW 5: Contributed to -->
  <svg x="25" y="147" width="14" height="14" viewBox="0 0 16 16" class="icon">
    <path d="M2 2.5A2.5 2.5 0 0 1 4.5 0h8.75a.75.75 0 0 1 .75.75v12.5a.75.75 0 0 1-.75.75h-2.5a.75.75 0 0 1 0-1.5h1.75v-2h-8a1 1 0 0 0-.714 1.7.75.75 0 1 1-1.072 1.05A2.495 2.495 0 0 1 2 11.5Z"/>
  </svg>
  <text x="48" y="158" class="label">Contributed to (last year):</text>
  <!-- ★ UPDATE THIS: change "3" to your actual repos contributed to -->
  <text x="230" y="158" class="value">3</text>

  <!-- =====================================================
       RANK BADGE — Edit the letter grade and label below
       A+, A, A-, B+, B, S, S+  are valid ranks
       ===================================================== -->
  <circle cx="405" cy="97" r="40" fill="none" stroke="#30363d" stroke-width="6"/>
  <!-- RANK PROGRESS ARC — stroke-dashoffset controls fill amount.
       Full circle = 251.2. Higher offset = less filled.
       ★ UPDATE THIS: change stroke-dashoffset (lower = more filled = better rank) -->
  <circle cx="405" cy="97" r="40" fill="none" stroke="#79c0ff" stroke-width="6"
          stroke-dasharray="251.2" stroke-dashoffset="60"
          stroke-linecap="round" transform="rotate(-90 405 97)"/>
  <!-- ★ UPDATE THIS: change "A+" to your actual rank letter -->
  <text x="405" y="103" class="rank-text" text-anchor="middle">A+</text>
  <text x="405" y="148" class="rank-sub" text-anchor="middle">Grade</text>
</svg>
